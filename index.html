<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Daisy Ul CDN -->
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- Style CSS -->
        <link rel="stylesheet" href="style.css" />
        <!-- Google Fonts Link -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
            rel="stylesheet"
        />
        <!-- *FontAwesome CDN -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <title>GitHub Issues Tracker</title>
    </head>
    <body class="overflow-y-scroll">
        <main class="bg-[#f8fafc] font-['Geist',sans-serif] min-h-screen">
            <!-- *Git Issues Tracker Login Page -->
            <section
                id="login_page"
                class="container mx-auto flex items-center justify-center min-h-screen"
            >
                <div
                    class="w-full sm:w-[520px] shadow-md p-4 sm:p-8 rounded-md bg-white space-y-6"
                >
                    <!-- *Logo header -->
                    <div class="flex flex-col mb-6 items-center">
                        <img
                            class="h-[100px] w-[100px] mb-6"
                            src="assets/github-logo.png"
                            alt=""
                        />
                        <h2 class="text-[24px] font-semibold mb-1">
                            GitHub Issues Tracker
                        </h2>
                        <p class="text-[#64748bFF]">
                            sign in to manage your issues
                        </p>
                    </div>
                    <!-- *Login Form -->
                    <form class="space-y-4" action="">
                        <div class="flex flex-col space-y-2">
                            <label class="font-medium" for="">Username</label>
                            <input
                                class="w-full p-4 rounded-lg outline-none border border-[#e4e4e7FF] mb-[6px]"
                                type="text"
                                name=""
                                placeholder="Enter Username"
                                id="username"
                            />
                            <p class="text-primary text-[14px]">
                                Default: admin
                            </p>
                        </div>
                        <div class="mb-0">
                            <label class="font-medium" for="">Password</label>
                            <input
                                class="w-full p-4 rounded-lg outline-none border border-[#e4e4e7FF] mb-[6px]"
                                type="password"
                                name=""
                                placeholder="Enter Password"
                                id="password"
                            />
                            <p class="text-primary text-[14px]">
                                Default: admin123
                            </p>
                        </div>
                        <input
                            id="sign_btn"
                            class="btn btn-primary w-full my-6 text-white"
                            type="submit"
                            value="Sign In"
                        />
                        <div class="flex items-center justify-between gap-2">
                            <div
                                class="h-[0.01px] border border-[#e4e4e7FF] w-full"
                            ></div>
                            <p>OR</p>
                            <div
                                class="h-[0.01px] border border-[#e4e4e7FF] w-full"
                            ></div>
                        </div>
                    </form>
                    <!-- *Demo option -->
                    <div class="text-center">
                        <p class="text-[#64748bFF] text-[14px] mb-2">
                            Demo Credentials
                        </p>
                        <div class="p-6 bg-base-200 space-y-0">
                            <h2 class="font-semibold">
                                Username: <span class="font-normal">admin</span>
                            </h2>
                            <h2 class="font-semibold">
                                Password:
                                <span class="font-normal">admin123</span>
                            </h2>
                        </div>
                    </div>
                </div>
            </section>

            <section id="main_container" class="hidden">
                <!-- Main Issues Tracker Navbar -->
                <nav
                    class="navbar border border-base-300 bg-white flex justify-between items-center py-[10px] lg:py-[20px] px-1 lg:px-20 mb-[20px] md:mb-[60px] sticky top-0 z-50"
                >
                    <div class="left flex items-center space-x-1">
                        <img
                            class="h-9 w-9"
                            src="assets/github-logo.png"
                            alt=""
                        />
                        <h2 class="hidden md:flex text-[24px] font-semibold">
                            GitHub Issues Tracker
                        </h2>
                    </div>
                    <div class="right">
                        <div class="join">
                            <div>
                                <label
                                    class="input outline-none join-item w-[180px] md:w-[300px] rounded-sm"
                                >
                                    <i
                                        class="fa-solid fa-magnifying-glass opacity-50"
                                    ></i>
                                    <input
                                        id="input_field"
                                        type="text"
                                        placeholder="Search issues..."
                                    />
                                </label>
                            </div>
                            <button
                                id="search_btn"
                                class="btn btn-primary ml-1 md:ml-4 flex items-center rounded-sm"
                            >
                                <i class="fa-solid fa-plus text-[12px]"></i> New
                                Issue
                            </button>
                        </div>
                    </div>
                </nav>

                <!-- Category Section -->
                <section
                    class="container mx-auto bg-white border-base-300 shadow-sm rounded-lg p-3 md:p-6 space-x-2 mb-2 md:mb-4"
                >
                    <button
                        id="all_issues_btn"
                        class="w-[100px] md:w-[120px] category_btn"
                    >
                        All
                    </button>
                    <button
                        id="open_issues_btn"
                        class="w-[100px] md:w-[120px] category_btn"
                    >
                        Open
                    </button>
                    <button
                        id="closed_issues_btn"
                        class="w-[100px] md:w-[120px] category_btn"
                    >
                        Closed
                    </button>
                </section>

                <!-- Count Issues Section -->
                <section
                    class="container mx-auto bg-white border-base-300 shadow-sm rounded-lg rounded-b-none p-3 md:p-6 flex flex-col md:flex-row justify-between md:items-center mb-[1px] space-y-2"
                >
                    <div class="left flex items-center space-x-2">
                        <div
                            class="h-[50px] w-[50px] bg-[#a754f5]/25 rounded-full flex justify-center items-center"
                        >
                            <img src="assets/Aperture.png" alt="" />
                        </div>
                        <div class="content">
                            <h2 class="text-[20px] font-semibold">
                                <span id="issues_count">50</span> Issues
                            </h2>
                            <p class="text-[#64748bFF] line-clamp-1">
                                Track and manage your project issues
                            </p>
                        </div>
                    </div>
                    <div class="right flex space-x-4">
                        <div class="space-x-2 flex items-center">
                            <div class="bg-success h-3 w-3 rounded-full"></div>
                            <p>Open</p>
                        </div>
                        <div class="space-x-2 flex items-center">
                            <div
                                class="bg-[#a754f5] h-3 w-3 rounded-full"
                            ></div>
                            <p>Closed</p>
                        </div>
                    </div>
                </section>

                <!-- Main Issue Section -->
                <section
                    id="loading"
                    class="hidden container mx-auto bg-white border-base-300 flex items-center justify-center h-56 p-3 md:p-6"
                >
                    <span class="loading loading-dots loading-lg"></span>
                </section>
                
                <section
                    id="issues_content"
                    class="hidden container mx-auto bg-white border-base-300 shadow-sm rounded-lg rounded-t-none p-3 md:p-6"
                >
                    <div
                        id="card_container"
                        class="card_container grid grid-cols-[repeat(auto-fit,minmax(300px,1fr))] gap-4"
                    ></div>
                </section>
            </section>
        </main>

        <!-- *UserName Not Match Modal -->
        <dialog id="invalid_modal" class="modal">
            <div class="modal-box">
                <div id="modal_content"></div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary outline-none">Close</button>
                    </form>
                </div>
            </div>
        </dialog>

        <dialog id="pop_modal_box" class="modal">
            <div class="modal-box">
                <div id="loading_modal" class="flex items-center justify-center h-28">
                    <span class="loading loading-dots loading-lg"></span>
                </div>
                <div id="pop_modal_content">
                    
                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn btn-primary outline-none">Close</button>
                    </form>
                </div>
            </div>
        </dialog>

        <script src="main.js"></script>
    </body>
</html>
